name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Verify action bundle is up to date
        run: |
          if ! git diff --exit-code -- packages/action/dist; then
            echo "::error::packages/action/dist is out of date. Run 'pnpm --filter @flagpost/action build' and commit the result."
            exit 1
          fi

      - name: Test (with coverage gate)
        run: pnpm test:coverage
